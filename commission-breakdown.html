<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bonus Breakdown</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    img, video, canvas, svg {
      max-width: 100%;
      display: block;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .dragging { opacity: 0.55; }
    .drop-target { outline: 2px dashed rgba(59,130,246,.45); outline-offset: -6px; }

    @media (max-width: 768px) {
      body {
        padding-top: clamp(48px, 12vw, 60px);
        padding-bottom: clamp(70px, 18vw, 90px);
        font-size: clamp(14px, 3.5vw, 16px);
      }

      .mobile-bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 1000;
      }
      .mobile-sticky-summary {
        display: flex;
        position: sticky;
        top: 0;
        z-index: 100;
        background: white;
        border-bottom: 1px solid #eee;
        padding: clamp(8px, 2vw, 12px) clamp(16px, 4vw, 24px);
        font-size: clamp(13px, 3vw, 15px);
      }

      nav.sticky { display: none; }
      header h1 { font-size: clamp(18px, 5vw, 28px); }

      table { display: none; }
      .mobile-card-container { display: block; }

      input, select {
        font-size: max(16px, 1vw);
        width: 100%;
        padding: clamp(10px, 2.5vw, 14px);
        border-radius: clamp(8px, 2vw, 12px);
        min-height: clamp(44px, 10vw, 52px);
      }

      button {
        min-height: clamp(44px, 10vw, 52px);
        padding: clamp(10px, 2.5vw, 14px) clamp(16px, 4vw, 24px);
        white-space: nowrap;
      }

      .add-category-btn {
        width: 100%;
      }

      .p-4.bg-slate-50.border-b {
        padding: clamp(12px, 4vw, 16px);
        gap: clamp(8px, 2vw, 12px);
      }

      .p-4.bg-slate-50 .flex {
        flex-direction: column;
        align-items: stretch;
        gap: clamp(8px, 2vw, 12px);
      }

      #allocation-status {
        text-align: left;
      }

      .delete-btn {
        min-width: 44px;
        min-height: 44px;
        opacity: 1;
      }

      .mobile-card-container > div {
        padding: clamp(12px, 4vw, 16px);
      }

      .rounded-2xl {
        border-radius: clamp(12px, 3vw, 24px);
        padding: clamp(12px, 4vw, 24px);
      }

      .max-w-5xl {
        padding-left: clamp(12px, 4vw, 20px);
        padding-right: clamp(12px, 4vw, 20px);
      }
    }

    .mobile-bottom-nav {
      display: none;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .mobile-sticky-summary,
    .mobile-card-container { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  <!-- Mobile Sticky Summary (hidden on desktop) -->
  <div class="mobile-sticky-summary fixed top-0 left-0 right-0 bg-white border-b border-slate-200 shadow-sm z-40 px-4 py-3">
    <div class="flex items-center justify-between text-sm">
      <div>
        <span class="text-slate-500 text-xs">Bonus:</span>
        <span id="mobile-bonus-display" class="font-bold text-slate-800 ml-1">$0</span>
      </div>
      <div class="text-right">
        <span id="mobile-status-display" class="font-bold text-slate-600 text-xs">0% allocated</span>
      </div>
    </div>
  </div>

  <!-- Sticky Navigation Bar -->
  <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 md:px-8 py-4">
      <div class="flex items-center gap-2">
        <a href="index.html" class="px-4 py-2 rounded-full font-semibold text-sm transition-all text-slate-700 hover:bg-slate-100">
          Budget Planner
        </a>
        <a href="commission-breakdown.html" class="px-4 py-2 rounded-full font-semibold text-sm transition-all bg-blue-600 text-white">
          Bonus
        </a>
        <a href="student-loans.html" class="px-4 py-2 rounded-full font-semibold text-sm transition-all text-slate-700 hover:bg-slate-100">
          Student Loans
        </a>
      </div>
    </div>
  </nav>

  <div class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
      <header class="mb-8">
        <div class="space-y-1">
          <h1 class="text-3xl font-bold tracking-tight text-slate-800">Bonus Breakdown</h1>
          <p class="text-slate-500 pt-1 text-sm">Split your bonus into percentage-based buckets.</p>
        </div>
      </header>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
      <label class="text-xs font-semibold uppercase text-slate-400 block tracking-tight mb-2">
        Bonus Check
      </label>
      <div class="flex items-center gap-2">
        <span class="text-lg font-bold">$</span>
        <input
          id="commission-input"
          type="number"
          value="5505.77"
          class="text-lg font-bold focus:outline-none w-40 bg-transparent"
          oninput="updateCommission(); saveState();"
        />
      </div>
      <p class="text-xs text-slate-400">Applies to this bonus payout only.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="p-4 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
        <h2 class="font-semibold text-slate-700">Bonus Allocation</h2>
        <div class="flex items-center gap-3">
          <span id="allocation-status" class="text-xs font-semibold text-slate-400">Allocation must total 100%</span>
          <button
            onclick="addAllocation()"
            class="add-category-btn text-sm bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg flex items-center justify-center gap-1 transition-colors"
          >
            <i data-lucide="plus" class="w-4 h-4"></i>
            Add Category
          </button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-white border-b border-slate-100">
            <tr class="text-left text-slate-500">
              <th class="px-4 py-3 font-semibold">Category</th>
              <th class="px-4 py-3 font-semibold">Percentage</th>
              <th class="px-4 py-3 font-semibold">Amount</th>
              <th class="px-4 py-3 font-semibold"></th>
            </tr>
          </thead>
          <tbody id="allocation-body" class="divide-y divide-slate-100">
          </tbody>
          <tfoot class="bg-slate-50 border-t border-slate-200">
            <tr>
              <td class="px-4 py-3 font-semibold text-slate-700">Total</td>
              <td id="total-percent" class="px-4 py-3 font-semibold text-slate-700">0.00%</td>
              <td id="total-amount" class="px-4 py-3 font-semibold text-slate-700">$0.00</td>
              <td class="px-4 py-3"></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <!-- Mobile Card Layout -->
      <div id="mobile-card-container" class="mobile-card-container divide-y divide-slate-100">
        <!-- Mobile cards injected here -->
      </div>
    </div>
  </div>
  </div>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-bottom-nav fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-lg z-50">
    <div class="flex items-center justify-around py-3">
      <a href="index.html" class="flex flex-col items-center gap-1 px-4 py-2 text-slate-500">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
        </svg>
        <span class="text-xs font-semibold">Budget</span>
      </a>
      <a href="commission-breakdown.html" class="flex flex-col items-center gap-1 px-4 py-2 text-blue-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="text-xs font-semibold">Bonus</span>
      </a>
      <a href="student-loans.html" class="flex flex-col items-center gap-1 px-4 py-2 text-slate-500">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
        <span class="text-xs font-semibold">Loans</span>
      </a>
    </div>
  </nav>

  <script>

    const STORAGE_KEY = 'commission_breakdown_state_v1';

    const DEFAULT_ALLOCATIONS = [
      { id: 'a1', name: 'Student Loan Boost', percent: 40 },
      { id: 'a2', name: 'Fun Money', percent: 35 },
      { id: 'a3', name: 'HYSA', percent: 19 },
      { id: 'a4', name: 'Brokerage', percent: 6 },
      { id: 'a5', name: 'ESPP', percent: 0 },
    ];

    let allocations = [...DEFAULT_ALLOCATIONS];

    function isMobile() {
      return window.innerWidth < 768;
    }

    function updateMobileSummary() {
      const commission = Number(document.getElementById('commission-input').value) || 0;
      let totalPercent = 0;
      allocations.forEach(item => totalPercent += item.percent);

      const bonusDisplay = document.getElementById('mobile-bonus-display');
      const statusDisplay = document.getElementById('mobile-status-display');

      if (bonusDisplay) {
        bonusDisplay.textContent = `$${Math.round(commission).toLocaleString()}`;
      }

      if (statusDisplay) {
        const diff = Math.round((totalPercent - 100) * 100) / 100;
        const absDiff = Math.abs(diff);
        if (absDiff < 0.01) {
          statusDisplay.textContent = '100% allocated ✓';
          statusDisplay.className = 'font-bold text-green-600 text-xs';
        } else if (diff < 0) {
          statusDisplay.textContent = `${Math.abs(diff).toFixed(0)}% remaining`;
          statusDisplay.className = 'font-bold text-amber-600 text-xs';
        } else {
          statusDisplay.textContent = `Over by ${diff.toFixed(0)}%`;
          statusDisplay.className = 'font-bold text-red-600 text-xs';
        }
      }
    }

    function safeParseJSON(str) {
      try { return JSON.parse(str); } catch { return null; }
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      const data = safeParseJSON(raw);
      if (!data) return;

      if (typeof data.commission === 'number') {
        const input = document.getElementById('commission-input');
        if (input) input.value = String(data.commission);
      }

      if (Array.isArray(data.allocations)) {
        allocations = data.allocations
          .filter(item => item && typeof item.id === 'string')
          .map(item => ({
            id: String(item.id),
            name: String(item.name ?? ''),
            percent: Number(item.percent) || 0,
          }));
      }
    }

    function saveState() {
      const commission = Number(document.getElementById('commission-input').value) || 0;
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ commission, allocations }));
    }

    function formatCurrency(value) {
      return value.toLocaleString('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2,
      });
    }

    function formatPercent(value) {
      return `${value.toFixed(2)}%`;
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function addAllocation() {
      allocations.push({
        id: Math.random().toString(36).slice(2, 10),
        name: '',
        percent: 0,
      });
      renderRows();
      updateCommission();
      saveState();
    }

    function removeAllocation(id) {
      allocations = allocations.filter(item => item.id !== id);
      renderRows();
      updateCommission();
      saveState();
    }

    function updateName(id, value) {
      const item = allocations.find(entry => entry.id === id);
      if (!item) return;
      item.name = value;
      updateCommission();
      saveState();
    }

    function updatePercent(id, value) {
      const num = Number(value);
      const item = allocations.find(entry => entry.id === id);
      if (!item) return;
      item.percent = Number.isFinite(num) ? num : 0;
      updateCommission();
      saveState();
    }

    let dragId = null;

    function onDragStart(e) {
      dragId = e.currentTarget.dataset.id;
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', dragId); } catch {}
      e.currentTarget.classList.add('dragging');
    }

    function onDragEnd(e) {
      dragId = null;
      e.currentTarget.classList.remove('dragging');
      document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
    }

    function onDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('drop-target');
      e.dataTransfer.dropEffect = 'move';
    }

    function onDragLeave(e) {
      e.currentTarget.classList.remove('drop-target');
    }

    function onDrop(e) {
      e.preventDefault();
      const targetId = e.currentTarget.dataset.id;
      const dragged = dragId || (() => { try { return e.dataTransfer.getData('text/plain'); } catch { return null; } })();
      e.currentTarget.classList.remove('drop-target');
      if (!dragged || !targetId || dragged === targetId) return;

      const from = allocations.findIndex(item => item.id === dragged);
      const to = allocations.findIndex(item => item.id === targetId);
      if (from == -1 || to == -1) return;

      const rect = e.currentTarget.getBoundingClientRect();
      const before = (e.clientY - rect.top) < (rect.height / 2);

      const [moved] = allocations.splice(from, 1);
      const targetIndexNow = allocations.findIndex(item => item.id === targetId);
      allocations.splice(before ? targetIndexNow : targetIndexNow + 1, 0, moved);

      renderRows();
      updateCommission();
      saveState();
    }

    function renderRows() {
      // Render desktop table
      const tbody = document.getElementById('allocation-body');
      tbody.innerHTML = '';

      if (allocations.length === 0) {
        const emptyRow = document.createElement('tr');
        emptyRow.innerHTML = '<td class="px-4 py-6 text-slate-400" colspan="4">No categories yet. Click "Add Category" to get started.</td>';
        tbody.appendChild(emptyRow);
      } else {
        allocations.forEach((item) => {
          const row = document.createElement('tr');
          row.setAttribute('draggable', 'true');
          row.dataset.id = item.id;
          row.addEventListener('dragstart', onDragStart);
          row.addEventListener('dragend', onDragEnd);
          row.addEventListener('dragover', onDragOver);
          row.addEventListener('dragleave', onDragLeave);
          row.addEventListener('drop', onDrop);

          row.innerHTML = `
            <td class="px-4 py-3">
              <div class="flex items-center gap-3">
                <span
                  class="text-slate-200"
                  title="Drag to reorder (display only)"
                  aria-label="Drag to reorder (display only)"
                >
                  <i data-lucide="grip-vertical" class="w-4 h-4"></i>
                </span>
                <input
                  type="text"
                  value="${escapeHtml(item.name)}"
                  placeholder="Category Name"
                  oninput="updateName('${item.id}', this.value)"
                  class="w-full bg-transparent border-none focus:ring-0 font-semibold text-slate-700 placeholder:text-slate-300 outline-none"
                />
              </div>
            </td>
            <td class="px-4 py-3">
              <div class="flex items-center gap-2">
                <input
                  type="number"
                  min="0"
                  max="100"
                  step="0.01"
                  value="${item.percent}"
                  class="w-24 bg-transparent border border-slate-200 rounded-md px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500"
                  oninput="updatePercent('${item.id}', this.value)"
                />
                <span class="text-slate-500">%</span>
              </div>
            </td>
            <td class="px-4 py-3 font-semibold text-slate-700" id="amount-${item.id}">$0.00</td>
            <td class="px-4 py-3 text-right">
              <button
                onclick="removeAllocation('${item.id}')"
                class="h-7 w-7 inline-flex items-center justify-center rounded-md text-slate-300 hover:text-red-500 hover:bg-red-50 transition"
                aria-label="Delete category"
                title="Delete"
              >
                <span class="text-sm leading-none font-semibold">×</span>
              </button>
            </td>
          `;

          tbody.appendChild(row);
        });
      }

      // Render mobile cards
      const mobileContainer = document.getElementById('mobile-card-container');
      if (mobileContainer) {
        mobileContainer.innerHTML = '';

        if (allocations.length === 0) {
          mobileContainer.innerHTML = '<div class="p-8 text-center text-slate-400">No categories yet. Click "Add Category" to get started.</div>';
        } else {
          allocations.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'p-4 bg-white relative';
            card.setAttribute('draggable', 'true');
            card.dataset.id = item.id;
            card.addEventListener('dragstart', onDragStart);
            card.addEventListener('dragend', onDragEnd);
            card.addEventListener('dragover', onDragOver);
            card.addEventListener('dragleave', onDragLeave);
            card.addEventListener('drop', onDrop);

            card.innerHTML = `
              <div class="flex items-start justify-between mb-3">
                <div class="flex items-center gap-2 flex-1">
                  <span class="text-slate-300">
                    <i data-lucide="grip-vertical" class="w-5 h-5"></i>
                  </span>
                  <input
                    type="text"
                    value="${escapeHtml(item.name)}"
                    placeholder="Category Name"
                    oninput="updateName('${item.id}', this.value)"
                    class="flex-1 bg-transparent border-none focus:ring-0 font-semibold text-slate-700 placeholder:text-slate-300 outline-none text-base"
                  />
                </div>
                <button
                  onclick="removeAllocation('${item.id}')"
                  class="delete-btn flex-shrink-0 h-9 w-9 inline-flex items-center justify-center rounded-md text-slate-400 hover:text-red-500 hover:bg-red-50 transition"
                  aria-label="Delete category"
                  title="Delete"
                >
                  <span class="text-xl leading-none font-semibold">×</span>
                </button>
              </div>

              <div class="flex items-center gap-3">
                <div class="flex-1">
                  <label class="text-xs text-slate-400 uppercase font-bold block mb-1">Percentage</label>
                  <div class="flex items-center gap-2">
                    <input
                      type="number"
                      min="0"
                      max="100"
                      step="0.01"
                      value="${item.percent}"
                      class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 text-left font-bold text-slate-900 outline-none focus:ring-2 focus:ring-blue-500 text-base"
                      oninput="updatePercent('${item.id}', this.value)"
                    />
                    <span class="text-slate-500 font-semibold">%</span>
                  </div>
                </div>
                <div class="text-right">
                  <label class="text-xs text-slate-400 uppercase font-bold block mb-1">Amount</label>
                  <p id="mobile-amount-${item.id}" class="font-mono text-base font-bold text-slate-700">$0.00</p>
                </div>
              </div>
            `;

            mobileContainer.appendChild(card);
          });
        }
      }

      lucide.createIcons();
      updateMobileSummary();
    }

    function updateCommission() {
      const input = document.getElementById('commission-input');
      const commission = Number(input.value) || 0;

      let totalPercent = 0;
      let totalAmount = 0;

      allocations.forEach((item) => {
        totalPercent += item.percent;
        const amount = (commission * item.percent) / 100;
        totalAmount += amount;

        // Update desktop table
        const amountCell = document.getElementById(`amount-${item.id}`);
        if (amountCell) {
          const amountText = formatCurrency(amount);
          if (item.percent === 0) {
            amountCell.innerHTML = `${amountText} <span class="text-xs text-slate-400 font-normal ml-2">Not allocated</span>`;
          } else {
            amountCell.textContent = amountText;
          }
        }

        // Update mobile cards
        const mobileAmountCell = document.getElementById(`mobile-amount-${item.id}`);
        if (mobileAmountCell) {
          mobileAmountCell.textContent = formatCurrency(amount);
        }
      });

      document.getElementById('total-percent').textContent = formatPercent(totalPercent);
      document.getElementById('total-amount').textContent = formatCurrency(totalAmount);

      const statusEl = document.getElementById('allocation-status');
      if (statusEl) {
        const diff = Math.round((totalPercent - 100) * 100) / 100;
        const absDiff = Math.abs(diff);
        if (absDiff < 0.01) {
          statusEl.textContent = '100% allocated';
          statusEl.className = 'text-xs font-semibold text-emerald-600';
        } else if (diff < 0) {
          statusEl.textContent = `Remaining: ${Math.abs(diff).toFixed(2)}%`;
          statusEl.className = 'text-xs font-semibold text-amber-600';
        } else {
          const overAmount = totalAmount - commission;
          if (overAmount > 0) {
            statusEl.textContent = `Over by: ${formatCurrency(overAmount)}`;
            statusEl.className = 'text-xs font-semibold text-red-600';
          } else {
            statusEl.textContent = 'Allocation must total 100%';
            statusEl.className = 'text-xs font-semibold text-slate-400';
          }
        }
      }

      updateMobileSummary();
    }

    loadState();
    renderRows();
    updateCommission();
    lucide.createIcons();

    // Bug 5 fix: Ensure Add Category button works on touch devices
    const addBtn = document.querySelector('.add-category-btn');
    if (addBtn) {
      addBtn.addEventListener('touchend', function(e) {
        e.preventDefault();
        addAllocation();
      }, { passive: false });
    }
  </script>
</body>
</html>
