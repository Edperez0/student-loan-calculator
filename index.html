<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Planner | Personal Finance Calculators</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    [v-cloak] { display: none; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }
    .dragging { opacity: 0.55; }
    .drop-target { outline: 2px dashed rgba(59,130,246,.45); outline-offset: -6px; }
  </style>
</head>

<body class="bg-slate-50 p-4 md:p-8 text-slate-900 font-sans">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-2xl shadow-2xl p-6 md:p-8">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl md:text-4xl font-bold text-gray-800">Budget Planner</h1>
                <div class="flex gap-4">
                    <button onclick="resetBudget()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors flex items-center gap-2">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                        Reset
                    </button>
                </div>
            </div>

            <!-- Income Section -->
            <div class="mb-8 p-6 bg-gradient-to-r from-green-50 to-emerald-50 rounded-xl border border-green-200">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i data-lucide="dollar-sign" class="w-6 h-6 text-green-600"></i>
                    Bi-Weekly Net Income
                </h2>
                <div class="flex gap-4 items-end">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Bi-Weekly Take-Home Pay</label>
                        <input type="number" id="biWeeklyIncome" placeholder="0.00"
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-green-500 focus:ring focus:ring-green-200 transition-all"
                               oninput="calculateBudget()">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Monthly Equivalent</label>
                        <div id="monthlyIncome" class="px-4 py-3 bg-white border-2 border-gray-300 rounded-lg text-lg font-semibold text-green-600">
                            $0.00
                        </div>
                    </div>
                </div>
            </div>

            <!-- Expenses Section -->
            <div class="mb-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i data-lucide="list" class="w-6 h-6 text-purple-600"></i>
                    Monthly Expenses
                    <span class="text-sm text-gray-500 ml-2">(Drag to reorder)</span>
                </h2>
                <div id="expensesList" class="space-y-3"></div>
                <button onclick="addExpense()" class="mt-4 w-full py-3 border-2 border-dashed border-gray-300 rounded-lg text-gray-600 hover:border-purple-500 hover:text-purple-600 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    Add Expense Category
                </button>
            </div>

            <!-- Summary Section -->
            <div class="mt-8 p-6 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl border border-blue-200">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i data-lucide="pie-chart" class="w-6 h-6 text-blue-600"></i>
                    Budget Summary
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white p-4 rounded-lg">
                        <div class="text-sm text-gray-600 mb-1">Total Income</div>
                        <div id="totalIncome" class="text-2xl font-bold text-green-600">$0.00</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg">
                        <div class="text-sm text-gray-600 mb-1">Total Expenses</div>
                        <div id="totalExpenses" class="text-2xl font-bold text-red-600">$0.00</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg">
                        <div class="text-sm text-gray-600 mb-1">Remaining</div>
                        <div id="remaining" class="text-2xl font-bold text-blue-600">$0.00</div>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="mt-6">
                    <div class="flex justify-between text-sm text-gray-600 mb-2">
                        <span>Budget Usage</span>
                        <span id="percentageUsed">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                        <div id="progressBar" class="h-full bg-gradient-to-r from-green-500 to-blue-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let expenses = [];
        let draggedElement = null;

        // Load saved state
        function loadState() {
            const saved = localStorage.getItem('budget_planner_state_v1');
            if (saved) {
                const state = JSON.parse(saved);
                document.getElementById('biWeeklyIncome').value = state.biWeeklyIncome || '';
                expenses = state.expenses || [];
                renderExpenses();
                calculateBudget();
            }
        }

        // Save state
        function saveState() {
            const state = {
                biWeeklyIncome: document.getElementById('biWeeklyIncome').value,
                expenses: expenses
            };
            localStorage.setItem('budget_planner_state_v1', JSON.stringify(state));
        }

        // Add new expense
        function addExpense() {
            expenses.push({ name: '', amount: 0 });
            renderExpenses();
            saveState();
        }

        // Remove expense
        function removeExpense(index) {
            expenses.splice(index, 1);
            renderExpenses();
            calculateBudget();
            saveState();
        }

        // Update expense
        function updateExpense(index, field, value) {
            expenses[index][field] = field === 'amount' ? parseFloat(value) || 0 : value;
            calculateBudget();
            saveState();
        }

        // Render expenses list
        function renderExpenses() {
            const container = document.getElementById('expensesList');
            container.innerHTML = expenses.map((expense, index) => `
                <div class="expense-item flex gap-3 items-center bg-white p-4 rounded-lg border-2 border-gray-200 hover:border-purple-300 transition-all cursor-move"
                     draggable="true"
                     data-index="${index}"
                     ondragstart="handleDragStart(event, ${index})"
                     ondragend="handleDragEnd(event)"
                     ondragover="handleDragOver(event)"
                     ondrop="handleDrop(event, ${index})">
                    <i data-lucide="grip-vertical" class="w-5 h-5 text-gray-400"></i>
                    <input type="text"
                           placeholder="Category name"
                           value="${expense.name}"
                           class="flex-1 px-3 py-2 border border-gray-300 rounded focus:border-purple-500 focus:ring focus:ring-purple-200"
                           oninput="updateExpense(${index}, 'name', this.value)">
                    <div class="flex items-center gap-2">
                        <span class="text-gray-600">$</span>
                        <input type="number"
                               placeholder="0.00"
                               value="${expense.amount || ''}"
                               class="w-32 px-3 py-2 border border-gray-300 rounded focus:border-purple-500 focus:ring focus:ring-purple-200"
                               oninput="updateExpense(${index}, 'amount', this.value)">
                    </div>
                    <button onclick="removeExpense(${index})" class="p-2 text-red-500 hover:bg-red-50 rounded transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Drag and drop handlers
        function handleDragStart(e, index) {
            draggedElement = index;
            e.currentTarget.classList.add('dragging');
        }

        function handleDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            draggedElement = null;
            document.querySelectorAll('.expense-item').forEach(item => {
                item.classList.remove('drag-over');
            });
        }

        function handleDragOver(e) {
            e.preventDefault();
            const item = e.currentTarget;
            item.classList.add('drag-over');
        }

        function handleDrop(e, dropIndex) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');

            if (draggedElement !== null && draggedElement !== dropIndex) {
                const draggedItem = expenses[draggedElement];
                expenses.splice(draggedElement, 1);
                expenses.splice(dropIndex, 0, draggedItem);
                renderExpenses();
                saveState();
            }
        }

        // Calculate budget
        function calculateBudget() {
            const biWeekly = parseFloat(document.getElementById('biWeeklyIncome').value) || 0;
            const netPay = (biWeekly * 26) / 12;

            document.getElementById('monthlyIncome').textContent = `$${netPay.toFixed(2)}`;

            const totalExp = expenses.reduce((sum, exp) => sum + (exp.amount || 0), 0);
            const remaining = netPay - totalExp;
            const percentage = netPay > 0 ? (totalExp / netPay) * 100 : 0;

            document.getElementById('totalIncome').textContent = `$${netPay.toFixed(2)}`;
            document.getElementById('totalExpenses').textContent = `$${totalExp.toFixed(2)}`;
            document.getElementById('remaining').textContent = `$${remaining.toFixed(2)}`;
            document.getElementById('remaining').className = `text-2xl font-bold ${remaining >= 0 ? 'text-green-600' : 'text-red-600'}`;

            document.getElementById('percentageUsed').textContent = `${percentage.toFixed(1)}%`;
            document.getElementById('progressBar').style.width = `${Math.min(percentage, 100)}%`;
            document.getElementById('progressBar').className = `h-full transition-all duration-500 ${
                percentage <= 75 ? 'bg-gradient-to-r from-green-500 to-blue-500' :
                percentage <= 100 ? 'bg-gradient-to-r from-yellow-500 to-orange-500' :
                'bg-gradient-to-r from-red-500 to-pink-500'
            }`;
        }

        // Reset budget
        function resetBudget() {
            if (confirm('Are you sure you want to reset your budget? This cannot be undone.')) {
                localStorage.removeItem('budget_planner_state_v1');
                document.getElementById('biWeeklyIncome').value = '';
                expenses = [];
                renderExpenses();
                calculateBudget();
            }
        }

        // Initialize
        lucide.createIcons();
        loadState();
    </script>
</body>
</html>
